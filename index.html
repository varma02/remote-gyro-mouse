<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>Gyro Mouse</title>
    <link rel="icon" href="/favicon.png" type="image/png" />
    <style>
      :root {
        --bg: #0b0d12;
        --surface: #141925;
        --line: rgba(255, 255, 255, 0.08);
        --accent: #5c7cfa;
        --text: #f1f3f5;
        --muted: #9aa2ad;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        background: radial-gradient(
          circle at top,
          #1a2030 0%,
          #0b0d12 60%,
          #090b0f 100%
        );
        color: var(--text);
        font-family: "Space Grotesk", "Trebuchet MS", sans-serif;
        overflow: hidden;
        touch-action: none;
      }

      .status {
        position: fixed;
        top: 12px;
        left: 12px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        color: var(--muted);
        z-index: 5;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #ff6b6b;
        box-shadow: 0 0 12px rgba(255, 107, 107, 0.6);
      }

      .status.connected .status-dot {
        background: #51cf66;
        box-shadow: 0 0 12px rgba(81, 207, 102, 0.6);
      }

      .track {
        position: fixed;
        inset: 0;
        background: linear-gradient(
          160deg,
          rgba(20, 25, 37, 0.96),
          rgba(12, 15, 22, 0.95)
        );
        border: 1px solid var(--line);
        z-index: 1;
      }

      .track::before,
      .track::after {
        content: "";
        position: absolute;
        inset: 24px;
        border-radius: 18px;
        border: 1px dashed rgba(92, 124, 250, 0.35);
      }

      .track::after {
        inset: 48px;
        border-style: solid;
        border-color: rgba(92, 124, 250, 0.2);
      }

      .hint {
        position: absolute;
        bottom: 18px;
        right: 18px;
        font-size: 12px;
        color: var(--muted);
        text-align: right;
        background: rgba(11, 13, 18, 0.6);
        padding: 8px 10px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .gyro {
        position: fixed;
        top: 12px;
        right: 12px;
        background: rgba(20, 25, 37, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--text);
        padding: 8px 12px;
        border-radius: 14px;
        font-size: 12px;
        z-index: 6;
      }

      .toast {
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: 12px;
        background: rgba(12, 15, 22, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--muted);
        padding: 10px 12px;
        border-radius: 12px;
        font-size: 12px;
        display: none;
        z-index: 6;
      }

      .toast.show {
        display: block;
      }

      .settings-btn {
        position: fixed;
        top: 52px;
        right: 12px;
        background: rgba(20, 25, 37, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--text);
        padding: 8px 12px;
        border-radius: 14px;
        font-size: 12px;
        z-index: 6;
      }

      .settings {
        position: fixed;
        top: 96px;
        right: 12px;
        width: 220px;
        background: rgba(12, 15, 22, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        padding: 12px;
        color: var(--text);
        font-size: 12px;
        z-index: 6;
        display: none;
      }

      .settings.open {
        display: block;
      }

      .settings label {
        display: block;
        margin-bottom: 10px;
      }

      .settings input[type="range"] {
        width: 100%;
      }

      .settings .value {
        float: right;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="status" id="status">
      <span class="status-dot"></span>
      <span id="status-text">Disconnected</span>
    </div>
    <button class="gyro" id="gyro">Enable gyro</button>
    <button class="settings-btn" id="settings-btn">Settings</button>
    <div class="settings" id="settings">
      <label>
        Mouse sensitivity
        <span class="value" id="mouse-value"></span>
        <input id="mouse-sens" type="range" min="1" max="80" step="1" />
      </label>
      <label>
        Scroll sensitivity
        <span class="value" id="scroll-value"></span>
        <input id="scroll-sens" type="range" min="0.1" max="3" step="0.1" />
      </label>
    </div>
    <div class="track" id="track">
      <div class="hint">Drag to move • Up/Down drag scrolls • Tap to click</div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
      const statusEl = document.getElementById("status");
      const statusText = document.getElementById("status-text");
      const track = document.getElementById("track");
      const gyroBtn = document.getElementById("gyro");
      const toast = document.getElementById("toast");
      const settingsBtn = document.getElementById("settings-btn");
      const settingsPanel = document.getElementById("settings");
      const mouseSensInput = document.getElementById("mouse-sens");
      const scrollSensInput = document.getElementById("scroll-sens");
      const mouseValue = document.getElementById("mouse-value");
      const scrollValue = document.getElementById("scroll-value");

      let socket;
      let lastX = null;
      let lastY = null;
      let lastTap = 0;
      let pendingDx = 0;
      let pendingDy = 0;
      let pendingScroll = 0;
      let touchActive = false;
      let gyroEnabled = false;
      let gyroSeen = false;
      let gyroWatchdog = null;
      let gyroLastTs = null;
      let lastOrientation = null;
      let usingMotion = false;
      let biasX = 0;
      let biasY = 0;
      let biasCount = 0;
      let scrollScale = 0.4;
      const moveScale = 2;
      let gyroGain = 20.0;
      const gyroMax = 200;
      const gyroDeadzone = 0.8;
      const gyroSmoothing = 0.9;
      const biasStillThreshold = 0.6;
      const accelGain = 2.2;
      const accelRef = 25;
      const accelMax = 6;
      const idleLockMs = 4000;
      const shakeThreshold = 200;
      const shakeWakeMs = 1500;
      let lastActivityTs = 0;
      let gyroLocked = false;
      const shakeSamples = [];
      let smoothX = 0;
      let smoothY = 0;
      const frameMs = 16;
      const maxQueue = 300;

      function connect() {
        const url = `wss://${location.host}/ws`;
        socket = new WebSocket(url);

        socket.addEventListener("open", () => {
          statusEl.classList.add("connected");
          statusText.textContent = "Connected";
        });

        socket.addEventListener("close", () => {
          statusEl.classList.remove("connected");
          statusText.textContent = "Disconnected";
          setTimeout(connect, 1500);
        });

        socket.addEventListener("error", () => {
          statusEl.classList.remove("connected");
          statusText.textContent = "Disconnected";
        });
      }

      function send(event, payload = {}) {
        if (!socket || socket.readyState !== WebSocket.OPEN) return;
        socket.send(JSON.stringify({ event, ...payload }));
      }

      function showToast(message, duration = 2000) {
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), duration);
      }

      function updateSettingsUI() {
        mouseSensInput.value = gyroGain.toFixed(1);
        scrollSensInput.value = scrollScale.toFixed(1);
        mouseValue.textContent = gyroGain.toFixed(1);
        scrollValue.textContent = scrollScale.toFixed(1);
      }

      function setGyroLocked(locked) {
        if (gyroLocked === locked) return;
        gyroLocked = locked;
        gyroBtn.textContent = locked ? "Gyro locked" : "Gyro on";
      }

      function recordActivity() {
        if (gyroLocked) return;
        lastActivityTs = performance.now();
      }

      track.addEventListener("pointerdown", (event) => {
        if (gyroLocked) return;
        track.setPointerCapture(event.pointerId);
        lastX = event.clientX;
        lastY = event.clientY;
        touchActive = true;
        recordActivity();
      });

      track.addEventListener("pointermove", (event) => {
        if (gyroLocked) return;
        if (lastX === null || lastY === null) return;
        const dx = event.clientX - lastX;
        const dy = event.clientY - lastY;
        if (Math.abs(dy) > 1) {
          pendingScroll += dy * scrollScale;
        }
        lastX = event.clientX;
        lastY = event.clientY;
        recordActivity();
      });

      function resetDrag() {
        lastX = null;
        lastY = null;
        pendingDx = 0;
        pendingDy = 0;
        pendingScroll = 0;
        touchActive = false;
      }

      track.addEventListener("pointerup", resetDrag);
      track.addEventListener("pointercancel", resetDrag);
      track.addEventListener("pointerleave", resetDrag);

      track.addEventListener("click", () => {
        if (gyroLocked) return;
        const now = Date.now();
        if (now - lastTap < 250) return;
        lastTap = now;
        touchActive = true;
        send("click");
        recordActivity();
        setTimeout(() => {
          touchActive = false;
        }, 150);
      });

      function flush() {
        if (Math.abs(pendingDx) > maxQueue)
          pendingDx = Math.sign(pendingDx) * maxQueue;
        if (Math.abs(pendingDy) > maxQueue)
          pendingDy = Math.sign(pendingDy) * maxQueue;
        if (Math.abs(pendingScroll) > maxQueue)
          pendingScroll = Math.sign(pendingScroll) * maxQueue;
        const dx = Math.round(pendingDx);
        const dy = Math.round(pendingDy);
        const scroll = Math.round(pendingScroll);
        if (dx !== 0 || dy !== 0) {
          send("move", { dx, dy });
        }
        if (scroll !== 0) {
          send("scroll", { dy: scroll });
        }
        pendingDx -= dx;
        pendingDy -= dy;
        pendingScroll -= scroll;
      }

      function updateBias(xRate, yRate) {
        if (
          Math.abs(xRate) < biasStillThreshold &&
          Math.abs(yRate) < biasStillThreshold
        ) {
          biasX = (biasX * biasCount + xRate) / (biasCount + 1);
          biasY = (biasY * biasCount + yRate) / (biasCount + 1);
          biasCount = Math.min(biasCount + 1, 200);
        }
      }

      function applyRates(xRate, yRate, dt) {
        updateBias(xRate, yRate);
        const x = -(xRate - biasX);
        const y = -(yRate - biasY);

        const speed = Math.hypot(x, y);
        const now = performance.now();

        shakeSamples.push({ t: now, s: speed });
        while (shakeSamples.length && now - shakeSamples[0].t > shakeWakeMs) {
          shakeSamples.shift();
        }

        const avgSpeed =
          shakeSamples.reduce((sum, sample) => sum + sample.s, 0) /
          Math.max(shakeSamples.length, 1);

        if (now - lastActivityTs > idleLockMs) {
          setGyroLocked(true);
        }

        if (gyroLocked) {
          if (avgSpeed < shakeThreshold) {
            return;
          }
          setGyroLocked(false);
        }
        let accelFactor = 1 + (speed / accelRef) * accelGain;
        if (accelFactor > accelMax) accelFactor = accelMax;

        let vx = x * gyroGain * dt * accelFactor;
        let vy = -y * gyroGain * dt * accelFactor;

        if (Math.abs(vx) < gyroDeadzone) vx = 0;
        if (Math.abs(vy) < gyroDeadzone) vy = 0;

        if (vx > gyroMax) vx = gyroMax;
        if (vx < -gyroMax) vx = -gyroMax;
        if (vy > gyroMax) vy = gyroMax;
        if (vy < -gyroMax) vy = -gyroMax;

        smoothX += (vx - smoothX) * gyroSmoothing;
        smoothY += (vy - smoothY) * gyroSmoothing;

        pendingDx += smoothX;
        pendingDy += smoothY;

        if (vx !== 0 || vy !== 0) {
          recordActivity();
        }
      }

      function onMotion(event) {
        if (!gyroEnabled) return;
        if (touchActive) return;
        const rate = event.rotationRate;
        if (!rate) return;
        gyroSeen = true;
        usingMotion = true;
        const now = event.timeStamp || performance.now();
        if (gyroLastTs === null) {
          gyroLastTs = now;
          return;
        }
        const rawDt = (now - gyroLastTs) / 1000;
        if (!isFinite(rawDt) || rawDt <= 0) return;
        const dt = Math.min(rawDt, 0.05);
        gyroLastTs = now;

        const alphaRate = typeof rate.alpha === "number" ? rate.alpha : null;
        const gammaRate = typeof rate.gamma === "number" ? rate.gamma : null;

        const angle =
          screen.orientation && typeof screen.orientation.angle === "number"
            ? screen.orientation.angle
            : typeof window.orientation === "number"
              ? window.orientation
              : 0;

        const xRate = gammaRate !== null ? gammaRate : 0;
        const yRate = alphaRate !== null ? alphaRate : 0;

        applyRates(xRate, -yRate, dt);
      }

      function onOrientation(event) {
        if (!gyroEnabled) return;
        if (touchActive) return;
        if (usingMotion) return;
        if (typeof event.alpha !== "number" || typeof event.beta !== "number")
          return;
        gyroSeen = true;
        const now = event.timeStamp || performance.now();
        if (gyroLastTs === null) {
          gyroLastTs = now;
          return;
        }
        const rawDt = (now - gyroLastTs) / 1000;
        if (!isFinite(rawDt) || rawDt <= 0) return;
        const dt = Math.min(rawDt, 0.05);
        gyroLastTs = now;

        if (!lastOrientation) {
          lastOrientation = {
            alpha: event.alpha,
            beta: event.beta,
            gamma: event.gamma,
          };
          return;
        }

        let dAlpha = event.alpha - lastOrientation.alpha;
        let dBeta = event.beta - lastOrientation.beta;
        let dGamma = event.gamma - lastOrientation.gamma;

        if (dAlpha > 180) dAlpha -= 360;
        if (dAlpha < -180) dAlpha += 360;
        if (dBeta > 180) dBeta -= 360;
        if (dBeta < -180) dBeta += 360;
        if (dGamma > 180) dGamma -= 360;
        if (dGamma < -180) dGamma += 360;

        lastOrientation = {
          alpha: event.alpha,
          beta: event.beta,
          gamma: event.gamma,
        };

        const alphaRate = dAlpha / dt;
        const gammaRate = dGamma / dt;

        const angle =
          screen.orientation && typeof screen.orientation.angle === "number"
            ? screen.orientation.angle
            : typeof window.orientation === "number"
              ? window.orientation
              : 0;

        const xRate = gammaRate;
        const yRate = alphaRate;

        applyRates(xRate, -yRate, dt);
      }

      async function enableGyro() {
        if (gyroEnabled) return;
        if (
          typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function"
        ) {
          const result = await DeviceOrientationEvent.requestPermission();
          if (result !== "granted") {
            showToast("Gyro permission denied");
            return;
          }
        }
        gyroEnabled = true;
        gyroLastTs = null;
        lastOrientation = null;
        usingMotion = false;
        biasX = 0;
        biasY = 0;
        biasCount = 0;
        smoothX = 0;
        smoothY = 0;
        lastActivityTs = performance.now();
        shakeSamples.length = 0;
        setGyroLocked(false);
        window.addEventListener("devicemotion", onMotion);
        window.addEventListener("deviceorientation", onOrientation);
        window.addEventListener("deviceorientationabsolute", onOrientation);
        if (gyroWatchdog) clearTimeout(gyroWatchdog);
        gyroWatchdog = setTimeout(() => {
          if (!gyroSeen) {
            showToast(
              "No gyro data. Check motion sensors and permissions.",
              3000,
            );
          }
        }, 1500);
        showToast("Gyro enabled");
        gyroBtn.textContent = "Gyro on";
      }

      gyroBtn.addEventListener("click", enableGyro);
      settingsBtn.addEventListener("click", () => {
        settingsPanel.classList.toggle("open");
      });

      mouseSensInput.addEventListener("input", () => {
        gyroGain = Number(mouseSensInput.value);
        updateSettingsUI();
      });

      scrollSensInput.addEventListener("input", () => {
        scrollScale = Number(scrollSensInput.value);
        updateSettingsUI();
      });
      track.addEventListener("pointerdown", () => {
        if (!gyroEnabled) enableGyro();
      });
      window.addEventListener("blur", resetDrag);
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) resetDrag();
      });

      updateSettingsUI();
      setInterval(flush, frameMs);

      connect();
    </script>
  </body>
</html>
